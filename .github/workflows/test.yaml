name: "build"
on:
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, macos-15-intel, ubuntu-22.04-arm, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: astral-sh/setup-uv@v2
        with:
          enable-cache: true
      - run: rustup toolchain install stable --profile minimal
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libreadline-dev libedit-dev
      - run: cargo build
        shell: bash
      - run: cargo run -- jupyter install
      - run: uv run --with ipykernel --with jupyter-core jupyter kernelspec list
        shell: bash
      - run: make test
        if: runner.os != 'Windows'
        shell: bash
      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cargo test
          uv run --project tests pytest -vv
  cross-compile-armv7:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - run: rustup toolchain install stable --profile minimal
      - run: rustup target add armv7-unknown-linux-gnueabihf
      - uses: Swatinem/rust-cache@v2
      - name: Install cross-compilation dependencies
        run: |
          sudo dpkg --add-architecture armhf
          sudo sed -i '/^Types: deb$/a Architectures: amd64' /etc/apt/sources.list.d/ubuntu.sources
          echo "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports/ noble main universe" | sudo tee /etc/apt/sources.list.d/armhf.list
          echo "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports/ noble-updates main universe" | sudo tee -a /etc/apt/sources.list.d/armhf.list
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf libreadline-dev:armhf libedit-dev:armhf
      - run: cargo build -p solite-cli --target armv7-unknown-linux-gnueabihf --features vendored-openssl
        env:
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: arm-linux-gnueabihf-gcc
  cross-compile-armv7-maturin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: PyO3/maturin-action@b1bd829e37fef14c63f19162034228a2f3dc1021 # v1
        with:
          target: armv7-unknown-linux-gnueabihf
          manylinux: 2_28
          args: --release --locked --out crates/solite-cli/dist -b bin -m crates/solite-cli/Cargo.toml --features vendored-openssl
          before-script-linux: |
            dpkg --add-architecture armhf
            sed -i 's/^deb http/deb [arch=amd64] http/' /etc/apt/sources.list
            echo "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports/ jammy main universe" >> /etc/apt/sources.list
            echo "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports/ jammy-updates main universe" >> /etc/apt/sources.list
            apt-get update
            apt-get install -y libreadline-dev:armhf
